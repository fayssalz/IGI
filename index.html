<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&display=swap" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        h1, h2 { color: #1a73e8; }
        .container { padding: 2rem; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 2rem; background-color: #f9f9f9; }
        #admin-section { background-color: #fff0e6; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input[type="text"], input[type="file"], select { width: 100%; padding: 8px; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #1a73e8; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background-color: #155ab6; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #results { margin-top: 1.5rem; padding: 1rem; border: 1px solid #ddd; border-radius: 4px; background-color: #e9f5ff; min-height: 50px; }
        .result-item { margin-bottom: 0.5rem; }
        .result-item strong { display: inline-block; width: 150px; }
    </style>
</head>
<body>

    <h1>Student Exam Results Portal</h1>

    <!-- Section for Student to search for their results -->
    <div id="student-section" class="container">
        <h2>Student Search</h2>
        <p>Enter your details to find your exam result.</p>
        <form id="search-form">
            <label for="student-id">Your ID:</label>
            <input type="text" id="student-id" required>

            <label for="course-name">Course:</label>
            <select id="course-name" required>
                <option value="">Select a course...</option>
            </select>

            <button type="submit" id="search-button" disabled>Search for Results</button>
        </form>

        <div id="results">Loading exam data... Please wait.</div>
    </div>

    <!-- This script tag includes the SheetJS library from a CDN -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <!-- This links to our custom JavaScript file -->
    <script src="script.js"></script>

</body>
</html>
